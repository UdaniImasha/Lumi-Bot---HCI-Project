[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
    ; This is the specific library for the code you posted
    earlephilhower/ESP8266Audio @ ^1.9.7
    adafruit/Adafruit NeoPixel @ ^1.12.0